<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Naruto Cyber Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: black;
}

/* BLUR BACKGROUND IMAGE */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://wallpapercave.com/wp/wp5128415.jpg') center/cover;
    filter: blur(8px) brightness(0.4);
}

/* LOGIN BOX */
.login-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 320px;
    padding: 30px;
    
    background: rgba(0, 0, 0, 0.85);
    border-radius: 12px;
    
    text-align: center;
    
    box-shadow: 0 0 25px red;
    border: 1px solid rgba(255,0,0,0.5);
    z-index: 10;
}

.login-box h2 {
    color: red;
    margin-bottom: 20px;
    text-shadow: 0 0 10px red;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    
    background: transparent;
    border: 1px solid red;
    color: white;
}

.login-box button {
    width: 100%;
    padding: 10px;
    
    background: red;
    border: none;
    color: white;
    
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.login-box button:hover {
    background: darkred;
    box-shadow: 0 0 10px red, 0 0 20px red;
}

/* FLOATING NARUTO CHARACTERS */
.naruto {
    position: absolute;
    width: 120px;
    pointer-events: none;
    animation: float 6s infinite ease-in-out;
    opacity: 0.9;
}

.naruto:nth-child(1) { left: 5%; top: 20%; animation-delay: 0s; }
.naruto:nth-child(2) { right: 10%; top: 30%; animation-delay: 2s; }
.naruto:nth-child(3) { left: 15%; bottom: 10%; animation-delay: 4s; }

@keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}

/* PARTICLES */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- Naruto Characters -->
<img src="https://i.imgur.com/2yaf2wb.png" class="naruto">
<img src="https://i.imgur.com/2yaf2wb.png" class="naruto">
<img src="https://i.imgur.com/2yaf2wb.png" class="naruto">

<canvas id="particles"></canvas>

<div class="login-box">
    <h2>Enter Discord Name</h2>
    <input type="text" placeholder="user#1234" id="username">
    <button onclick="login()">LOGIN</button>
</div>

<script>
// LOGIN
function login() {
    let user = document.getElementById("username").value;
    if(user === "") {
        alert("Enter your Discord name!");
    } else {
        alert("Welcome " + user);
    }
}

/* CHAKRA PARTICLES (BLUE + PINK) */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 150; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speedX: (Math.random() - 0.5),
        speedY: (Math.random() - 0.5),
        color: Math.random() > 0.5 ? "cyan" : "magenta"
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

        ctx.fillStyle = p.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
